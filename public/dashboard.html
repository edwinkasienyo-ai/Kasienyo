<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IIMS Dashboard</title>
    <link rel="stylesheet" href="/styles.css?v=7" />
  </head>
  <body class="dashboard-page">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-brand">
            <h2>IIMS SYSTEM</h2>
            <p>Integrated Management Information System</p>
          </div>
          <p id="portalLabel" class="portal-label">Portal</p>
          <p id="iimsBuildLineDash" class="iims-build-line" aria-live="polite"></p>
        </div>
        <div class="nav-group-label">Core</div>
        <button data-module="dashboard">Dashboard</button>
        <div class="nav-group-label">System Administration</div>
        <button data-module="system-register">Register (Institution/User)</button>
        <button data-module="system-access-control">Access Control (Module Rights)</button>
        <button data-module="system-audit">Security & Logging Audit</button>
        <button data-module="system-registry">Institutions & Users Registry</button>
        <button data-module="system-recycle-bin">Recycle Bin</button>
        <button data-module="system-cbc-editor">CBC Curriculum Editor</button>
        <button data-module="admission">Admission</button>
        <button data-module="attendance">Attendance Management</button>
        <div class="nav-group-label">Management & Academics</div>
        <button data-module="management-teachers">Teachers Profile</button>
        <button data-module="management-non-teaching">Non-Teaching Staff</button>
        <button data-module="management-teacher-resources">Teacher Resources</button>
        <button data-module="academic-exams">Exam Management</button>
        <button data-module="academic-marks">Marks Entry</button>
        <div class="nav-group-label">HR & Finance</div>
        <button data-module="hr-leave">HR Leave</button>
        <button data-module="hr-recruitment">HR Recruitment</button>
        <button data-module="finance-fee-structure">Fee Structure</button>
        <button data-module="finance-fee-payments">Fee Payments</button>
        <button data-module="finance-payroll">Payroll</button>
        <button data-module="finance-salary-advance">Salary Advances</button>
        <button data-module="finance-procurement">Procurement</button>
        <div class="nav-group-label">Communication & Welfare</div>
        <button data-module="communication-announcements">Announcements</button>
        <button data-module="communication-messages">SMS/Communication</button>
        <button data-module="parents-results">Parents/BOM Results</button>
        <button data-module="learner-materials">Learner Materials</button>
        <button data-module="welfare-members">Welfare Members</button>
        <button data-module="welfare-contributions">Welfare Contributions</button>
        <button data-module="welfare-loans">Welfare Loans</button>
        <button data-module="laws">Laws/Regulations/Policies</button>
        <button id="logoutButton" class="danger">Logout</button>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <div class="topbar-left">
            <h1 id="moduleTitle">Dashboard</h1>
            <p id="passwordExpiryNotice" class="small-note"></p>
          </div>
          <div class="topbar-right">
            <input id="globalSearch" placeholder="Global search by learner/teacher/parent..." />
            <button id="searchButton">Search</button>
            <button id="updateHeroImageButton">Update Login Hero Image</button>
            <button id="changeCredentialsButton">Change Credentials</button>
            <input
              id="heroImageInput"
              type="file"
              accept="image/jpeg,image/png,image/webp,image/gif,image/avif"
              hidden
            />
          </div>
        </header>

        <section class="dashboard-toolbar">
          <div class="quick-action-grid">
            <button class="quick-action-card" data-module="dashboard" type="button">
              <h4>Overview</h4>
              <p>Monitor live institution insights</p>
            </button>
            <button class="quick-action-card" data-module="admission" type="button">
              <h4>Admissions</h4>
              <p>Manage learner onboarding records</p>
            </button>
            <button class="quick-action-card" data-module="attendance" type="button">
              <h4>Attendance</h4>
              <p>Track daily class and staff presence</p>
            </button>
            <button class="quick-action-card" data-module="finance-fee-payments" type="button">
              <h4>Finance</h4>
              <p>Review fee collection and balances</p>
            </button>
            <button class="quick-action-card" data-module="communication-messages" type="button">
              <h4>Communication</h4>
              <p>Dispatch messages and open chat</p>
            </button>
            <button class="quick-action-card" data-module="laws" type="button">
              <h4>Policies</h4>
              <p>Access laws and governance files</p>
            </button>
          </div>
        </section>

        <section id="cards" class="cards"></section>
        <section id="formArea" class="form-area"></section>
        <section class="table-area">
          <p class="table-hint">Module records are displayed below with quick edit and export actions.</p>
          <table id="dataTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </section>
      </main>
    </div>

    <script src="/dashboard.js?v=7"></script>
  </body>
</html>
