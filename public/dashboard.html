<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IIMS Dashboard</title>
    <link rel="stylesheet" href="/styles.css?v=20260419-1" />
  </head>
  <body class="dashboard-page">
    <aside class="sidebar">
      <h2>IIMS SYSTEM</h2>
      <p id="portalLabel" class="portal-label">Portal</p>
      <button data-module="dashboard">Dashboard</button>
      <button data-module="admission">Admission</button>
      <button data-module="management-teachers">Teachers Profile</button>
      <button data-module="management-non-teaching">Non-Teaching Staff</button>
      <button data-module="management-teacher-resources">Teacher Resources</button>
      <button data-module="attendance">Attendance Management</button>
      <button data-module="academic-exams">Exam Management</button>
      <button data-module="academic-marks">Marks Entry</button>
      <button data-module="hr-leave">HR Leave</button>
      <button data-module="hr-recruitment">HR Recruitment</button>
      <button data-module="finance-fee-structure">Fee Structure</button>
      <button data-module="finance-fee-payments">Fee Payments</button>
      <button data-module="finance-procurement">Procurement</button>
      <button data-module="communication-announcements">Announcements</button>
      <button data-module="communication-messages">SMS/Communication</button>
      <button data-module="parents-results">Parents/BOM Results</button>
      <button data-module="learner-materials">Learner Materials</button>
      <button data-module="welfare-members">Welfare Members</button>
      <button data-module="welfare-contributions">Welfare Contributions</button>
      <button data-module="welfare-loans">Welfare Loans</button>
      <button data-module="laws">Laws/Regulations/Policies</button>
      <button id="logoutButton" class="danger">Logout</button>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <h1 id="moduleTitle">Dashboard</h1>
        <div class="topbar-right">
          <input id="globalSearch" placeholder="Global search by learner/teacher/parent..." />
          <button id="searchButton">Search</button>
          <button id="changeCredentialsButton">Change Credentials</button>
        </div>
      </header>

      <section id="cards" class="cards"></section>
      <section id="formArea" class="form-area"></section>
      <section class="table-area">
        <table id="dataTable">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </section>
    </main>

    <script src="/dashboard.js?v=20260419-1"></script>
  </body>
</html>
