<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IMIS | Page Not Found</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="/styles.css?v=16" />
    <style>
      body { background: radial-gradient(circle at top right, #ebf5ff 0%, #f7faff 44%, #f2f6fc 100%); }
      .notfound-shell { min-height: 100vh; display: grid; place-items: center; padding: 22px; }
      .notfound-card { width: 100%; max-width: 760px; background: #fff; border-radius: 18px; border: 1px solid #d8e3f2; box-shadow: 0 16px 28px rgba(16,44,84,.12); padding: 24px; text-align: center; }
      .notfound-card h1 { margin: 0 0 6px; color: #0f3860; }
      .notfound-card p { color: #38536e; line-height: 1.65; }
      .notfound-nav { margin-top: 14px; display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; }
      .notfound-nav a { text-decoration: none; padding: 8px 12px; border-radius: 999px; border: 1px solid #c9ddf6; color: #0f3860; background: #eef6ff; font-weight: 700; font-size: 12px; }
    </style>
  </head>
  <body>
    <main class="notfound-shell">
      <section class="notfound-card">
        <h1>PAGE NOT FOUND</h1>
        <p>THE REQUESTED RESOURCE DOES NOT EXIST OR HAS MOVED. USE THE LINKS BELOW TO CONTINUE.</p>
        <nav class="notfound-nav">
          <a href="/">Go to Login</a>
          <a href="/support.html">Support</a>
          <a href="/status.html">Service Status</a>
          <a href="/privacy.html">Privacy</a>
        </nav>
      </section>
    </main>
  </body>
</html>
