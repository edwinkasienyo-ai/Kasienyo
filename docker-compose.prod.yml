version: "3.9"

# rev54 production stack: app + MySQL + nginx (TLS termination) on a single VPS.
# Bring up with:  docker compose -f docker-compose.prod.yml up -d --build
#
# Required .env keys (see HOSTING.md for full list):
#   MYSQL_ROOT_PASSWORD, IMIS_DB_PASS, JWT_SECRET, OPENAI_API_KEY,
#   SMTP_*, TWILIO_*, AT_*, IMIS_DOMAIN, IIMS_BUILD_STAMP

services:
  app:
    build: .
    image: imis-basic-learning:rev56
    container_name: imis_app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: imis_app
      DB_PASS: "${IMIS_DB_PASS:-change-me}"
      DB_NAME: iims_school_system
      IIMS_CSRF_ENABLED: "true"
      IIMS_APPROVAL_GATE: "true"
      IIMS_AI_QUEUE_BACKEND: "redis"
      REDIS_URL: "redis://redis:6379"
      AI_QUEUE_NAME: "imis-ai"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    expose:
      - "5002"
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "-O", "-", "http://127.0.0.1:5002/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  db:
    image: mysql:8.4
    container_name: imis_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-change-me}"
      MYSQL_DATABASE: iims_school_system
      MYSQL_USER: imis_app
      MYSQL_PASSWORD: "${IMIS_DB_PASS:-change-me}"
    command:
      - --default-authentication-plugin=caching_sha2_password
      - --innodb-buffer-pool-size=512M
      - --max-connections=200
    volumes:
      - imis_db_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p\"$$MYSQL_ROOT_PASSWORD\""]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 25s

  redis:
    image: redis:7-alpine
    container_name: imis_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - imis_redis_data:/data

  nginx:
    image: nginx:1.27-alpine
    container_name: imis_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./scripts/nginx-imis.conf:/etc/nginx/conf.d/default.conf:ro
      - ./scripts/letsencrypt:/etc/letsencrypt:ro
      - ./scripts/letsencrypt-www:/var/www/certbot:ro

volumes:
  imis_db_data:
  imis_redis_data:
