# rev54 — IMIS nginx config (HTTP -> HTTPS, then proxy to Node on :5002).
# Run certbot once with `certbot certonly --webroot -w /var/www/certbot -d <your domain>`
# and the certificate paths below resolve.

server {
  listen 80;
  server_name _;

  # ACME http-01 challenge
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name _;

  # Cert paths are substituted by deploy-bootstrap.sh after the first
  # `certbot certonly --webroot` run.
  ssl_certificate     /etc/letsencrypt/live/www.theimis.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/www.theimis.com/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  client_max_body_size 32m;
  proxy_buffers 16 16k;
  proxy_buffer_size 16k;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Static assets straight from /uploads (mounted into the app container).
  location /uploads/ {
    proxy_pass http://app:5002;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://app:5002;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
